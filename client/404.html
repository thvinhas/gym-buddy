<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>FitTracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <p>Redirecionando para a aplicação...</p>
    <script>
      const base = "/gym-buddy/";
      const pathname = window.location.pathname.replace(base, "") || "/";
      const search = window.location.search || "";
      const hash = window.location.hash || "";
      window.location.replace(base + "#" + pathname + search + hash);
    </script>
    <noscript>
      <p>
        O JavaScript é necessário para redirecionar corretamente. Volte para
        <a href="/gym-buddy/">FitTracker</a>.
      </p>
    </noscript>
  </body>
</html>
